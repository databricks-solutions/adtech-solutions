resources:
  apps:
    campaign_pacing:
      name: "campaign-pacing"
      description: "Real-time ad campaign pacing dashboard — impressions vs CPM budget"
      source_code_path: ../campaign_pacing_app

      resources:
        - name: "campaign-pacing-db"
          description: "Lakebase Provisioned instance for campaign pacing state"
          database:
            database_name: "databricks_postgres"
            instance_name: ${resources.database_instances.campaign_pacing_instance.name}
            permission: "CAN_CONNECT_AND_CREATE"
        - name: "campaign-pacing-warehouse"
          description: "SQL warehouse for joining segment definitions from Delta"
          sql_warehouse:
            id: e9b34f7a2e4b0561
            permission: "CAN_USE"

      permissions:
        - level: CAN_USE
          group_name: users
        - level: CAN_MANAGE
          user_name: ${var.admin_user}
