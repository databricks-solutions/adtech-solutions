command:
  - uvicorn
  - src.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: PGHOST
    valueFrom: campaign-pacing-db
  - name: PGDATABASE
    value: databricks_postgres
  - name: LAKEBASE_INSTANCE
    value: campaign-pacing
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: campaign-pacing-warehouse
